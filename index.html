<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pasanga Diaries</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
overflow-x:hidden;
}

.container{
text-align:center;
padding:80px 20px 30px;
}

.logo{
width:110px;
border-radius:50%;
box-shadow:0 0 20px cyan;
}

h1{
font-size:40px;
margin:15px;
text-shadow:0 0 15px cyan;
}

p{
max-width:700px;
margin:auto;
line-height:1.6;
font-size:18px;
color:#ddd;
}

.buttons{
margin-top:30px;
}

.buttons a{
padding:12px 25px;
margin:10px;
border-radius:25px;
text-decoration:none;
color:white;
font-weight:bold;
display:inline-block;
transition:.3s;
}

.youtube{
background:#ff0000;
}

.facebook{
background:#1877f2;
}

.buttons a:hover{
transform:scale(1.1);
}

/* VIDEO SECTION */

.video-section{
margin-top:40px;
padding:20px;
text-align:center;
}

.video-section h2{
margin-bottom:20px;
}

.slider{
display:flex;
justify-content:center;
}

.slider iframe{
width:90%;
max-width:900px;
height:400px;
border:none;
border-radius:12px;
box-shadow:0 0 20px black;
}

/* footer */

.footer{
text-align:center;
padding:12px;
background:rgba(0,0,0,0.5);
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo">

<h1>Pasanga Diaries</h1>

<p>
Welcome to Pasanga Diaries — Your source for fun, laughter, festivals, food, and real stories!
Join our journey through city streets, temples, and tasty treats.
</p>

<div class="buttons">

<a class="youtube"
href="https://youtube.com/@pasangadiaries"
target="_blank">
Subscribe on YouTube
</a>

<a class="facebook"
href="https://www.facebook.com/share/1ChFrzeBzM/"
target="_blank">
Follow on Facebook
</a>

</div>

</div>


<!-- YOUTUBE VIDEOS -->

<div class="video-section">

<h2>Latest Videos</h2>

<div class="slider">

<iframe
src="https://www.youtube.com/embed/videoseries?list=UU"
allow="autoplay"
allowfullscreen>
</iframe>

</div>

</div>


<div class="footer">
Contact us: pasangadiaries@gmail.com
</div>

</body>
</html>
